name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build and test
        run: |
          dotnet build Sinx.sln -c Release -warnaserror
          dotnet test tests/ModernBoxes.Tests/ModernBoxes.Tests.csproj -c Release --no-build

      - name: Publish zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          ./installer/build.ps1 -Configuration Release -Version $version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ModernBoxes-*.zip
          generate_release_notes: true
