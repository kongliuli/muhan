name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install vpk
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Build and test
        run: |
          dotnet build Sinx.sln -c Release -warnaserror
          dotnet test tests/ModernBoxes.Tests/ModernBoxes.Tests.csproj -c Release --no-build

      - name: Publish Velopack + zip + portable
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          ./installer/build.ps1 -Configuration Release -Version $version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ModernBoxes-*.zip
            releases/**/*
          generate_release_notes: true

  winget:
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Submit winget manifest
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) {
            Write-Host "WINGET_TOKEN not set; skip winget submission"
            exit 0
          }
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet tool install -g wingetcreate
          wingetcreate update kongliuli.ModernBoxes `
            --version $version `
            --url "https://github.com/kongliuli/muhan/releases/download/${{ github.ref_name }}/ModernBoxes-win-Setup.exe" `
            --token $env:WINGET_TOKEN
