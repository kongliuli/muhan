name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Sinx.sln

      - name: Build
        run: dotnet build Sinx.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test tests/ModernBoxes.Tests/ModernBoxes.Tests.csproj -c Release --no-build --verbosity normal
